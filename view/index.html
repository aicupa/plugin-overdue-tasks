<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #e0e0e0;
      background: #1e1e1e;
    }
    h3 {
      font-size: 15px;
      margin-bottom: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .count {
      font-size: 12px;
      color: #999;
      font-weight: 400;
    }
    .list {
      max-height: 360px;
      overflow-y: auto;
    }
    .item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #2a2a2a;
      gap: 10px;
    }
    .item:hover { background: #333; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.danger { background: #ff4d4f; }
    .dot.warning { background: #faad14; }
    .dot.default { background: #1890ff; }
    .dot.secondary { background: #888; }
    .dot.success { background: #52c41a; }
    .content {
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .time {
      font-size: 12px;
      color: #f5222d;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .empty {
      text-align: center;
      padding: 40px 0;
      color: #666;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #666;
    }
    .refresh-btn {
      background: none;
      border: 1px solid #404040;
      color: #e0e0e0;
      padding: 2px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .refresh-btn:hover { border-color: #1890ff; color: #1890ff; }
  </style>
</head>
<body>
  <h3>
    <span>Overdue Tasks (>48h) <span class="count" id="count"></span></span>
    <button class="refresh-btn" onclick="loadTasks()">Refresh</button>
  </h3>
  <div id="list"><div class="loading">Loading...</div></div>

  <script>
    let callId = 0
    const pending = {}
    let currentFilePath = ''

    function callPlugin(method, params) {
      return new Promise((resolve, reject) => {
        const id = ++callId
        pending[id] = { resolve, reject }
        window.parent.postMessage({ type: 'plugin-call', id, method, params }, '*')
      })
    }

    window.addEventListener('message', (event) => {
      const msg = event.data
      if (msg?.type === 'plugin-init') {
        currentFilePath = msg.filePath || ''
        loadTasks()
        return
      }
      if (msg?.type === 'plugin-result' && pending[msg.id]) {
        const { resolve, reject } = pending[msg.id]
        delete pending[msg.id]
        if (msg.error) reject(new Error(msg.error))
        else resolve(msg.result)
      }
    })

    function formatDuration(hours) {
      if (hours >= 24) {
        const days = Math.floor(hours / 24)
        const h = hours % 24
        return h > 0 ? days + 'd ' + h + 'h' : days + 'd'
      }
      return hours + 'h'
    }

    async function loadTasks() {
      const listEl = document.getElementById('list')
      const countEl = document.getElementById('count')
      listEl.innerHTML = '<div class="loading">Loading...</div>'

      try {
        const result = await callPlugin('getOverdueTasks', { filePath: currentFilePath })
        const tasks = result?.result?.tasks || []
        countEl.textContent = tasks.length > 0 ? '(' + tasks.length + ')' : ''

        if (tasks.length === 0) {
          listEl.innerHTML = '<div class="empty">No overdue tasks</div>'
          return
        }

        listEl.innerHTML = tasks.map(function(t) {
          return '<div class="item">' +
            '<span class="dot ' + (t.level || 'default') + '"></span>' +
            '<span class="content">' + escapeHtml(t.content) + '</span>' +
            '<span class="time">' + formatDuration(t.hours) + '</span>' +
            '</div>'
        }).join('')
      } catch (e) {
        listEl.innerHTML = '<div class="empty">Failed to load</div>'
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div')
      div.textContent = str
      return div.innerHTML
    }
  </script>
</body>
</html>
